<head>

        body {
            margin: 0;
        }
    </style>
</head>
<body>

        background-color: #f1f1f1;
        text-align: center;

        <img src="https://ftp.mioz.cn/test/2026/03/24/1774364427.JPG" alt="logo" width="100" height="100s">

    <div style="
      max-width: 780px;

      ">
      <p>我的网络</p>

    <div style="
        background-color: #f1f1f1;

    ">
      <p>我的网站</p>
      <a href=""></a>

</body>
<body>
    <!--头部导航栏-->
    <div class="container mt-3">
        <nav class="navbar navbar-expand-lg navbar-light bg-light rounded">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <i class="fas fa-calendar-check text-danger"></i>中国节日搜索
                </a>
                <!-- 补充搜索框（原代码缺失） -->
                <div class="d-flex ms-auto">
                    <input type="text" id="searchInput" class="form-control me-2" placeholder="输入节日名称搜索（如：春节）">
                    <button class="btn btn-danger" onclick="searchFestival()">搜索</button>
                </div>
            </div>
        </nav>
        
        <!-- 节日卡片展示区 -->
        <div class="container mt-5" id="festivalist">
            <!-- 修复 ID 为 festivalCards（与 JS 匹配） -->
            <div class="row" id="festivalCards">
                <!-- 节日卡片会在这里显示 -->
            </div>
        </div>
    </div>

<script>
    // 修复：所有中文逗号改为英文逗号，补充缺失的逗号
    const festivals = [
        { 
            name:"春节", 
            date:"农历正月初一", 
            desc:"中国最重要的传统节日，全家团圆辞旧迎新", 
            customs:"贴春联、放鞭炮、吃年夜饭、拜年", 
            food:"饺子、年糕" 
        },
        { name: "元宵节", date: "农历正月十五", desc: "春节后的第一个月圆之夜，象征团圆", customs: "赏花灯、猜灯谜、舞龙舞狮", food: "汤圆、元宵" },
        { name: "清明节", date: "4月4日或5日", desc: "祭祖扫墓，踏青郊游", customs: "扫墓、插柳、放风筝", food: "青团" },
        { name: "端午节", date: "农历五月初五", desc: "纪念爱国诗人屈原", customs: "赛龙舟、挂艾草、佩香囊", food: "粽子" },
        { name: "七夕节", date: "农历七月初七", desc: "中国情人节", customs: "乞巧、拜织女", food: "巧果" },
        { name: "中秋节", date: "农历八月十五", desc: "赏月团圆，寄托思乡之情", customs: "赏月、拜月、玩花灯", food: "月饼" },
        { name: "重阳节", date: "农历九月初九", desc: "登高祈福，敬老爱老", customs: "登高、赏菊、插茱萸", food: "重阳糕" },
        { name: "腊八节", date: "农历腊月初八", desc: "祈求丰收吉祥", customs: "喝腊八粥、泡腊八蒜", food: "腊八粥" }
    ];

    // 修复：DOM 元素 ID 改为 festivalCards
    function showFestivals(list) {
        let html = '';
        list.forEach(item => {
            html += `
                <div class="col-md-3 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h4 class="card-title text-danger">${item.name}</h4>
                            <p class="text-muted">📅 ${item.date}</p>
                            <p class="card-text">${item.desc}</p>
                            <button class="btn btn-sm btn-outline-danger" onclick="showDetail('${item.name}', '${item.date}', '${item.customs}', '${item.food}')">
                                查看详情
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        document.getElementById('festivalCards').innerHTML = html;
    }

    // 查看详情
    function showDetail(name, date, customs, food) {
        alert(`🎉 ${name}\n📅 ${date}\n🏮 习俗：${customs}\n🍜 美食：${food}`);
    }

    // 搜索功能
    function searchFestival() {
        const keyword = document.getElementById('searchInput').value.trim(); // 增加 trim 去除空格
        const filtered = festivals.filter(f => f.name.includes(keyword));
        if(filtered.length > 0) {
            showFestivals(filtered);
        } else {
            document.getElementById('festivalCards').innerHTML = '<div class="col-12 text-center"><p class="text-muted">未找到相关节日，试试输入：春节、端午、中秋</p></div>';
        }
    }

    // 页面加载显示所有节日
    showFestivals(festivals);
</script>

</body>
    
</html>
